<!DOCTYPE html>
<html>
<head>
  <title>Profile - Gaming Hub</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f17;
      color:white;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:40px;
    }

    .profile-card{
      background:#111827;
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,255,255,0.2);
    }

    .profile-card img{
      width:120px;
      height:120px;
      border-radius:50%;
      border:3px solid cyan;
      margin-bottom:15px;
    }

    h1{
      margin:10px 0;
      color:cyan;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      margin-top:25px;
    }

    .stat{
      background:#1f2937;
      padding:15px 10px;
      border-radius:12px;
      width:30%;
    }

    .stat h2{
      color:cyan;
    }

    .section{
      margin-top:30px;
      background:#111827;
      padding:20px;
      border-radius:15px;
    }

    .games{
      display:flex;
      gap:20px;
      margin-top:15px;
    }

    .game{
      background:#1f2937;
      padding:10px;
      border-radius:10px;
      width:120px;
      text-align:center;
    }

    button{
      margin-top:20px;
      padding:10px 25px;
      border:none;
      border-radius:20px;
      background:cyan;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="profile-card">
    <img src="mahadeepu.jpeg">
    <h1>Mahadeep_14</h1>
    <p>Pro Gamer | Battle Royale Specialist</p>

    <div class="stats">
      <div class="stat">
        <h2>120</h2>
        <p>Games</p>
      </div>
      <div class="stat">
        <h2>85</h2>
        <p>Wins</p>
      </div>
      <div class="stat">
        <h2>6969</h2>
        <p>Points</p>
      </div>
    </div>

    <button>Edit Profile</button>
  </div>

  <div class="section">
    <h2>Recent Games</h2>

    <div class="games">
      <div class="game">
        <p>Free Fire</p>
      </div>

      <div class="game">
        <p>PUBG</p>
      </div>

      <div class="game">
        <p>Cyber Assassin</p>
      </div>
    </div>
  </div>

</div>

</body>
</html>
