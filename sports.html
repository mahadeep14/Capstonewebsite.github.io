<!DOCTYPE html>
<html>
<head>
<title>Sports Games</title>
<style>
body{background:#0b0f17;color:white;font-family:Arial;padding:40px;}
h1{text-align:center;color:cyan;text-shadow:0 0 15px cyan;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-top:40px;}
.card{background:#111827;border-radius:15px;overflow:hidden;transition:0.3s;}
.card img{width:100%;height:200px;object-fit:cover;}
.card:hover{transform:translateY(-10px);box-shadow:0 0 20px cyan;}
</style>
</head>

<body>

<h1>⚽ Sports Games</h1>

<div class="grid">

<div class="card">
<img src="  https://i.ytimg.com/vi/y3X1ytNpNaU/maxresdefault.jpg">
<p>Football Pro</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<p>Cricket League</p>
</div>

<div class="card">
<img src="https://i.ytimg.com/vi/y3X1ytNpNaU/maxresdefault.jpg">
<p>Basketball King</p>
</div>

</div>

</body>
</html>
