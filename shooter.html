<!DOCTYPE html>
<html>
<head>
<title>Shooter Games</title>
<style>
body{background:#0b0f17;color:white;font-family:Arial;padding:40px;}
h1{text-align:center;color:cyan;text-shadow:0 0 15px cyan;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-top:40px;}
.card{background:#111827;border-radius:15px;overflow:hidden;transition:0.3s;}
.card img{width:100%;height:200px;object-fit:cover;}
.card:hover{transform:translateY(-10px);box-shadow:0 0 20px cyan;}
</style>
</head>

<body>

<h1>🎯 Shooter Games</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<p>Sniper Elite</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6">
<p>Gun Master</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<p>FPS Arena</p>
</div>

</div>

</body>
</html>
