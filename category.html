<!DOCTYPE html>

    <title>Category</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#8e18e9;
    color:white;
}
.bg-video{
    position:fixed;
    width:100vw;
    height:100vh;
    z-index:-2;
    object-fit:cover;
    top:0;
    left:0;
}
.video-overlay{
    position:fixed;
    width:100vw;
    height:100vh;
    z-index:-1;
    top:0;
    left:0;
    background:rgba(0,0,0,0.6);
}
header{
    padding:20px 25px;
    display:flex;
    justify-content:space-between;
}
.games{
    padding:60px;
}
.games h2{
    font-size:40px;
    text-align:center;
    text-shadow:0 0 10px cyan,0 0 20px cyan;
}
.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:40px;
}
.card{
    background:#111827;
    border-radius:8px;
    overflow:hidden;
    transition:0.4s;
}
.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}
.card .info{
    padding:20px;
}
.card:hover{
    transform:translateY(-20px);
    box-shadow:0 0 30px cyan;
}
</style>
</head>
