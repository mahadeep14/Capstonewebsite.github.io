<!DOCTYPE html>
<html>
<head>
  <title>Live & Achievements - Gaming Hub</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f17;
      color:white;
      padding:40px;
    }

    h1{
      text-align:center;
      color:cyan;
      text-shadow:0 0 15px cyan;
      margin-bottom:40px;
    }

    .section{
      max-width:900px;
      margin:40px auto;
    }

    .card{
      background:#111827;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 0 20px violet;
    }

    

    .live h3{
      color:red;
    }

    

    .achievement h3{
      color:cyan;
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      background:#1f2937;
      border-radius:10px;
      margin:5px;
      font-size:14px;
    }

  </style>
</head>

<body>

<h1>🔥 Live Matches & Achievements</h1>

<!-- LIVE MATCHES -->
<div class="section">

  <h2>🔴 Live Matches</h2>

  <div class="card live">
    <h3>Battle Royale - Squad Match</h3>
    <p>Players: ShadowX, KillerPro, SniperGod</p>
    <p>Status: Ongoing 🔴</p>
  </div>

  <div class="card live">
    <h3>Sniper Arena</h3>
    <p>Players: GhostRider vs DarkKnight</p>
    <p>Status: Ongoing 🔴</p>
  </div>

</div>

<!-- ACHIEVEMENTS -->
<div class="section">

  <h2>🎯 Achievements</h2>

  <div class="card achievement">
    <h3>Your Badges</h3>

    <span class="badge">🔥 First Win</span>
    <span class="badge">🎯 Headshot Master</span>
    <span class="badge">💎 Diamond Rank</span>
    <span class="badge">⚡ 10 Wins Streak</span>

  </div>

</div>

</body>
</html>
